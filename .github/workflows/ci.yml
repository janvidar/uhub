name: CI

on:
  push:
    branches: [ master ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build + unit tests across compilers and the minimal/full feature configs.
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.compiler }}, ${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        config: [minimal, full]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          # SQLite3 and a TLS library are hard requirements of CMakeLists.txt:
          # TLS is mandatory, so find_package(OpenSSL REQUIRED) always runs.
          sudo apt-get install -y cmake perl libsqlite3-dev libssl-dev ${{ matrix.compiler }}

      - name: Configure
        run: |
          if [ "${{ matrix.config }}" = "full" ]; then
            cmake -S . -B build \
              -DRELEASE=OFF -DLOWLEVEL_DEBUG=ON -DADC_STRESS=ON
          else
            cmake -S . -B build \
              -DRELEASE=ON -DADC_STRESS=OFF
          fi

      - name: Build
        run: cmake --build build -j

      - name: Run unit tests
        run: ./build/autotest-bin

  # ---------------------------------------------------------------------------
  # macOS build + tests, across both TLS providers. Exercises the kqueue backend
  # (and, forced, the select fallback) on a non-Linux platform -- the kind of
  # gap that has let macOS-only bugs reach the tree -- and covers the LibreSSL
  # backend, which is supported but otherwise unbuilt in CI. OpenSSL and
  # LibreSSL are both keg-only Homebrew formulae; CMake is pointed at the
  # selected one's prefix.
  # ---------------------------------------------------------------------------
  macos:
    name: macos (${{ matrix.tls }}, kqueue + select)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        tls: [openssl@3, libressl]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        # perl ships with macOS; the rest come from Homebrew.
        run: brew install cmake sqlite ${{ matrix.tls }}

      - name: Configure
        run: |
          cmake -S . -B build -DRELEASE=OFF \
            -DOPENSSL_ROOT_DIR="$(brew --prefix ${{ matrix.tls }})" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix sqlite)"

      - name: Build
        run: cmake --build build -j

      - name: Run unit tests (kqueue)
        run: ./build/autotest-bin

      # Force the select backend so the non-epoll/non-kqueue fallback path is
      # actually exercised somewhere in CI.
      - name: Run unit tests (select fallback)
        run: EVENT_NOKQUEUE=1 ./build/autotest-bin

  # ---------------------------------------------------------------------------
  # FreeBSD build + tests, in a VM on the Linux runner (GitHub has no native
  # FreeBSD runner). Covers kqueue on a second BSD platform and FreeBSD's base
  # OpenSSL. Same select-fallback pass as macOS.
  # ---------------------------------------------------------------------------
  freebsd:
    name: freebsd (kqueue + select)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build + test in a FreeBSD VM
        uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1.5.0
        with:
          usesh: true
          # OpenSSL is in the FreeBSD base system; sqlite3/cmake/perl are pkgs.
          prepare: |
            pkg install -y cmake perl5 sqlite3
          run: |
            set -e
            # Capture a core if autotest crashes (an intermittent kqueue/DNS
            # segfault has been seen here). Cores land as <name>.core in the cwd
            # (kern.corefile default), which the action syncs back to the host
            # for the upload step below.
            ulimit -c unlimited
            cmake -S . -B build -DRELEASE=OFF
            # FreeBSD's make (bmake) requires an argument for -j, unlike the GNU
            # make used on the Linux/macOS jobs where a bare -j is fine.
            cmake --build build -j $(sysctl -n hw.ncpu)
            ./build/autotest-bin
            EVENT_NOKQUEUE=1 ./build/autotest-bin

      # If the VM run failed (e.g. the intermittent crash), keep any core dump
      # and the unstripped binary so the failure can be debugged offline.
      - name: Upload crash core dump
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: freebsd-cores
          path: |
            *.core
            **/*.core
            build/autotest-bin
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Windows build on a native runner. uhub's Windows support is the build.zig
  # (WinSock/MinGW) path -- CMake is not ported to Windows. We build the tested
  # x86_64-windows-gnu (MinGW ABI) target with zig, which produces a
  # self-contained PE, then run it (uhub -V) so the job exercises the binary at
  # runtime -- linking, CRT startup, getopt -- not just that a PE was emitted.
  # zig fetches the bundled LibreSSL from build.zig.zon (hash-pinned); SQLite is
  # vendored in third_party/sqlite3. The autotest binary is POSIX-only (socket-fd
  # semantics that do not map onto WinSock) and is intentionally not built for
  # Windows.
  # ---------------------------------------------------------------------------
  windows:
    name: windows (native, zig)
    runs-on: windows-latest
    env:
      ZIG_VERSION: "0.16.0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install zig ${{ env.ZIG_VERSION }}
        shell: pwsh
        run: |
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/zig-x86_64-windows-$env:ZIG_VERSION.zip"
          Invoke-WebRequest -Uri $url -OutFile zig.zip
          Expand-Archive -Path zig.zip -DestinationPath "$HOME\zig"
          "$HOME\zig\zig-x86_64-windows-$env:ZIG_VERSION" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build (x86_64-windows-gnu)
        run: zig build -Dtarget=x86_64-windows-gnu

      - name: Smoke test + artifacts
        shell: pwsh
        run: |
          & .\zig-out\bin\uhub.exe -V
          if (-not (Test-Path .\zig-out\bin\uhub-passwd.exe)) { throw "uhub-passwd.exe missing" }
          $dlls = Get-ChildItem .\zig-out\lib\*.dll
          if ($dlls.Count -eq 0) { throw "no plugin DLLs built" }
          $dlls | ForEach-Object { $_.Name }

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UndefinedBehaviorSanitizer over the full test suite.
  # This is a hard gate: any memory error or UB fails the build.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: asan + ubsan
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl libsqlite3-dev libssl-dev clang

      # Built with RELEASE=OFF so the DEBUG-only internal ADC_MSG_ASSERT
      # consistency checks run under the sanitizers as well.
      - name: Configure (ASan/UBSan)
        run: |
          cmake -S . -B build-asan -DRELEASE=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build-asan --target autotest-bin -j

      - name: Run unit tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-asan/autotest-bin

  # ---------------------------------------------------------------------------
  # ThreadSanitizer over the full suite. The hub is single-threaded except for
  # the DNS resolver worker pool, so this is the one place a data race can live;
  # the DNS pool stress tests (test_connect.tcc) drive it under contention.
  # ---------------------------------------------------------------------------
  tsan:
    name: threadsanitizer
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl libsqlite3-dev libssl-dev clang

      - name: Configure (TSan)
        run: |
          cmake -S . -B build-tsan -DRELEASE=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=thread -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build-tsan --target autotest-bin -j

      - name: Run unit tests under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1
        run: ./build-tsan/autotest-bin

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UndefinedBehaviorSanitizer on macOS, so the kqueue
  # backend and the DNS pool are exercised under a sanitizer (the Linux asan job
  # runs the epoll backend; kqueue was previously never sanitized). LSan is not
  # available on macOS, so leak detection is left off.
  # ---------------------------------------------------------------------------
  macos-asan:
    name: macos asan+ubsan (kqueue)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: brew install cmake sqlite openssl@3

      - name: Configure (ASan/UBSan)
        run: |
          cmake -S . -B build-asan -DRELEASE=OFF \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix sqlite)" \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build-asan --target autotest-bin -j

      - name: Run unit tests under ASan/UBSan (kqueue)
        env:
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-asan/autotest-bin

      - name: Run unit tests under ASan/UBSan (select fallback)
        env:
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: EVENT_NOKQUEUE=1 ./build-asan/autotest-bin

  # ---------------------------------------------------------------------------
  # Connection-churn stress under ASan/UBSan: run the adcrush load generator
  # against a live hub, then shut the hub down with clients still attached. This
  # drives the accept/login/route/teardown lifecycle under load -- churn the unit
  # suite never produces -- and guards the shutdown-time user-manager UAF.
  # ---------------------------------------------------------------------------
  stress:
    name: adcrush churn (asan)
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl libsqlite3-dev libssl-dev clang

      - name: Configure (ASan/UBSan + stress tools)
        run: |
          cmake -S . -B build-stress -DRELEASE=OFF -DADC_STRESS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build hub + adcrush
        run: cmake --build build-stress --target uhub adcrush -j

      - name: Run adcrush churn under ASan
        run: BUILD=build-stress test/e2e/run_adcrush_asan.sh

  # ---------------------------------------------------------------------------
  # Time-boxed regression fuzzing of the pre-auth ADC parser. Seeded from the
  # checked-in corpus + dictionary. A crash fails the job and uploads the
  # reproducer as an artifact.
  # ---------------------------------------------------------------------------
  fuzz:
    name: fuzz parsers (smoke)
    runs-on: ubuntu-latest
    env:
      CC: clang
      # UB (not just memory errors) must fail the job, so the number/IP
      # parsers stay overflow-free.
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          # libsqlite3-dev / libssl-dev: CMakeLists requires SQLite3 and a TLS
          # library to configure, even though the fuzz targets don't use them.
          # perl: CMake's find_package(Perl REQUIRED) runs for every configure
          # (autotest/test.c is generated by the exotic Perl script).
          sudo apt-get install -y cmake clang perl libsqlite3-dev libssl-dev

      - name: Configure (libFuzzer)
        run: cmake -S . -B build-fuzz -DFUZZING=ON -DRELEASE=ON

      - name: Build fuzzers
        run: cmake --build build-fuzz --target fuzz_message fuzz_adc_escape fuzz_ipcalc fuzz_config_token fuzz_command_parser fuzz_metrics fuzz_login -j

      - name: Fuzz adc_msg_parse (90s)
        run: |
          ./build-fuzz/fuzz_message \
            -dict=autotest/fuzz/adc.dict \
            -max_total_time=90 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/message

      - name: Fuzz adc escape/unescape (45s)
        run: |
          ./build-fuzz/fuzz_adc_escape \
            -max_total_time=45 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/adc_escape

      - name: Fuzz ipcalc address/range parser (45s)
        run: |
          ./build-fuzz/fuzz_ipcalc \
            -max_total_time=45 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/ipcalc

      - name: Fuzz config tokenizer (45s)
        run: |
          ./build-fuzz/fuzz_config_token \
            -max_total_time=45 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/config_token

      - name: Fuzz command parser (75s)
        run: |
          ./build-fuzz/fuzz_command_parser \
            -max_total_time=75 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/command_parser

      - name: Fuzz metrics HTTP request classifier (45s)
        run: |
          ./build-fuzz/fuzz_metrics \
            -dict=autotest/fuzz/metrics.dict \
            -max_total_time=45 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/metrics

      - name: Fuzz INF login-validation pipeline (90s)
        run: |
          ./build-fuzz/fuzz_login \
            -dict=autotest/fuzz/login.dict \
            -max_total_time=90 -timeout=15 -rss_limit_mb=2048 \
            -print_final_stats=1 \
            autotest/fuzz/corpus/login

      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crashes
          path: |
            crash-*
            timeout-*
            oom-*
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Test coverage: build gcc --coverage, run the suite under both event
  # backends (epoll and, forced, select), and report with gcovr. The Cobertura
  # XML goes to Codecov (best-effort -- never fails the build); the HTML report
  # is kept as an artifact.
  # ---------------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      CC: gcc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl libsqlite3-dev libssl-dev gcc gcovr

      - name: Configure (coverage)
        run: |
          cmake -S . -B build-cov -DRELEASE=OFF \
            -DCMAKE_C_FLAGS="--coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build-cov --target autotest-bin -j

      # Two runs so both event backends are covered: the default (epoll) and,
      # forced via EVENT_NOEPOLL, the select fallback. .gcda counters accumulate
      # across runs.
      - name: Run test suite (epoll + forced select)
        run: |
          ./build-cov/autotest-bin
          EVENT_NOEPOLL=1 ./build-cov/autotest-bin

      - name: Generate coverage report
        run: |
          mkdir -p coverage-html
          gcovr --root . --filter 'src/' \
            --print-summary \
            --xml coverage.xml \
            --html-details coverage-html/index.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: coverage.xml
          fail_ci_if_error: false   # a Codecov hiccup must not fail the build

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-html
          path: coverage-html/
          if-no-files-found: ignore
