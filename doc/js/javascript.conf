# Example mod_javascript script list.
#
# Point the plugin at this file:
#   plugin /usr/lib/uhub/mod_javascript.so "config=/etc/uhub/javascript.conf"
#
# One script per line: "<path> [key=value ...]". '#' starts a comment and blank
# lines are ignored. Relative paths resolve against this file's directory. The
# per-script key=value options are exposed to that script as uhub.config.

welcome.js     motd=Welcome to the hub, %n!
chat_only.js
flood.js       grace=3
