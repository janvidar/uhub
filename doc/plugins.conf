# ATTENTION!
# Plugins are invoked in the order of listing in the plugin config file.

# Optional: base directory for plugins given by a relative name.
#
# By default a plugin path is passed to the loader as-is: an absolute path is
# loaded directly, while a bare name (no leading '/') is resolved by the dynamic
# linker relative to the current working directory - rarely what you want.
#
# Set plugin_dir to a directory and any following "plugin" line whose name is
# not absolute is loaded from there instead. Absolute paths always override it.
# It applies to the plugin lines that follow it, so place it first.
#
#plugin_dir /usr/lib/uhub


# Sqlite based user authentication.
#
# This plugin provides a Sqlite based authentication database for
# registered users. It also persists bans (from !ban / the hub).
# Use the uhub-passwd utility to create the database and add/remove users.
#
# Parameters:
# file:      path/filename for database.
# exclusive: if true, users not in the database are rejected outright.
#
plugin /usr/lib/uhub/mod_auth_sqlite.so "file=/etc/uhub/users.db"

# Self-service registration commands (!regme / !passwd).
#
# !regme <password>  - register your current nick (guest)
# !passwd <password> - change the password of your registered nick (registered user)
# After !regme, set the password in your client and reconnect to log in.
#
# This is a business-logic plugin: it stores nothing itself and uses whichever
# auth storage plugin is loaded (e.g. mod_auth_sqlite above), so a future
# mod_auth_<backend> needs no self-registration code of its own. Takes no
# parameters. NOTE: any guest can permanently claim any unregistered nick.
#
#plugin /usr/lib/uhub/mod_selfregister.so

# Topic commands.
# Note: "topic" == "hub description" (as configured in uhub.conf)
#
# !topic      - change the topic (op required)
# !showtopic  - show the topic
# !resettopic - reset the topic to the default (op required)
#
# This plugins takes no parameters.
#plugin /usr/lib/uhub/mod_topic.so

# User-command (UCMD) context menus.
#
# Publishes a set of hub commands as ADC right-click context-menu entries in
# clients that support the UCM0 extension (DC++, AirDC++, etc.). Selecting an
# entry makes the client send the corresponding "+command" on the user's behalf.
#
# This plugin takes no parameters.
#plugin /usr/lib/uhub/mod_ucmd.so

# Log file writer
#
# Parameters:
# file: path/filename for log file.
# syslog: if true then syslog is used instead of writing to a file (Unix only)
plugin /usr/lib/uhub/mod_logging.so "file=/var/log/uhub.log"

# A simple example plugin
#plugin /usr/lib/uhub/mod_example.so

# A plugin sending a welcome message.
#
# This plugin provides the following commands:
# !motd - Message of the day
# !rules - Show hub rules.
#
# Parameters:
# motd: path/filename for the welcome message (message of the day)
# rules: path/filename for the rules file
#
# NOTE: The files MUST exist, however if you do not wish to provide one then these parameters can be omitted.
#
# The motd/rules files can do the following substitutions:
# %n - Nickname of the user who entered the hub or issued the command.
# %a - IP address of the user
# %c - The credentials of the user (guest, user, op, super, admin).
# %% - Becomes '%'
# %H - Hour 24-hour format (00-23) (Hub local time)
# %I - Hour 12-hour format (01-12) (Hub local time)
# %P - 'AM' or 'PM'
# %p - 'am' or 'pm'
# %M - Minutes (00-59) (Hub local time)
# %S - Seconds (00-60) (Hub local time)
plugin /usr/lib/uhub/mod_welcome.so "motd=/etc/uhub/motd.txt rules=/etc/uhub/rules.txt"

# Load the chat history plugin.
#
# This plugin provides chat history when users are connecting, or
# when users invoke the !history command.
# The history command can optionally take a parameter to indicate how many lines of history is requested.
#
# Parameters:
# history_max:     the maximum number of messages to keep in history
# history_default: when !history is provided without arguments, then this default number of messages are returned.
# history_connect: the number of chat history messages to send when users connect (0 = do not send any history)
plugin /usr/lib/uhub/mod_chat_history.so "history_max=200 history_default=10 history_connect=5"

# Flood action plugin.
#
# The hub itself detects floods using the flood_ctl_* thresholds in uhub.conf.
# When a flood is detected it raises an event; this plugin decides what to do
# about it. With no flood plugin loaded the hub keeps its built-in behaviour
# (drop the offending message and send the configured msg_user_flood_* warning).
#
# This example keeps a per-user strike counter: while a user stays below the
# 'grace' count the hub applies its normal drop+warning, and once they reach it
# the plugin disconnects them.
#
# Parameters:
# grace:             number of detected floods tolerated before the user is
#                    disconnected (default 3, minimum 1).
# operator_override: if true (default), operators and above are never acted
#                    upon by this plugin.
#plugin /usr/lib/uhub/mod_flood.so "grace=3 operator_override=1"

# Chat-only hub.
#
# Turns the hub into a chat-only hub: file search, search results and
# client-to-client connection setup are all denied, so no file transfers can
# take place. Main chat and private messages are unaffected (see
# mod_chat_is_privileged below to restrict those).
#
# This plugin takes no parameters.
#plugin /usr/lib/uhub/mod_chat_only.so

# Privileged chat.
#
# Restricts who may write in main chat and who may send private messages,
# using a per-message minimum credential. This is the plugin counterpart to the
# built-in chat_is_privileged option in uhub.conf, adding private-message
# control to defend against private-message spam from guests.
#
# Each parameter is a minimum credential (none/guest/reg/op/admin/...); a user
# at or above that level is allowed, everyone below is denied (with a one-time
# notice).
#
# Parameters:
# allow_mainchat:   minimum credential to write in main chat        (default: guest)
# allow_privchat:   minimum credential to send a private message    (default: guest)
# allow_op_contact: minimum credential to private-message an        (default: guest)
#                   operator/admin. Applies when the *recipient* is an operator
#                   or above; keep it at or below allow_privchat so ordinary
#                   users can always reach staff even when peer-to-peer private
#                   messaging is locked down.
#
# Example: let everyone read/write main chat, but only registered users send
# private messages, while any user may still PM an operator:
#plugin /usr/lib/uhub/mod_chat_is_privileged.so "allow_privchat=reg allow_op_contact=guest"
