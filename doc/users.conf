# uhub access control lists (bans and denied nicks).
#
# NOTE: registered users (operators, admins, ...) are NO LONGER configured here.
# Account credentials are handled by an authentication plugin -- see
# file_plugins in uhub.conf and mod_auth_simple / mod_auth_sqlite. The old
# user_reg / user_op / user_admin / link / bot keywords are obsolete; if present
# they are ignored with a warning.
#
# Syntax: <command> [data]
#
# commands:
# 'deny_nick'  - nick name that is not accepted (example; Administrator)
# 'deny_ip'    - Unacceptable IP (masks can be specified as CIDR: 0.0.0.0/32 will block all IPv4)
# 'ban_nick'   - banned user by nick
# 'ban_cid'    - banned user by cid

# We don't want users with these names
deny_nick Hub-Security
deny_nick Administrator
deny_nick root
deny_nick admin
deny_nick username
deny_nick user
deny_nick guest
deny_nick operator

# Banned users
# ban_nick H4X0R
# ban_cid FOIL5EK2UDZYAXT7UIUFEKL4SEBEAJE3INJDKAY

# ban by ip
#
# to ban by CIDR
# deny_ip 10.21.44.0/24
#
# to ban by IP-range.
# deny_ip 10.21.44.7-10.21.44.9
#
# to ban a single IP address
# deny_ip 10.21.44.7
# (which is equivalent to using):
# deny_ip 10.21.44.7/32

# NAT override moved out of this file. To let trusted clients behind NAT
# advertise their own IP, use the 'nat_override' option in uhub.conf instead.

# If you have made changes to this file, you must send a HANGUP signal
# to uhub so that it will re-read the configuration files.
# For example by invoking: 'killall -HUP uhub'
